<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  
  <!-- Background -->
  <rect width="512" height="512" rx="110" fill="#020617"/>

  <!-- Film strip body -->
  <rect x="120" y="160" width="260" height="180" rx="20" fill="#facc15"/>

  <!-- Film holes (left) -->
  <circle cx="140" cy="190" r="6" fill="#020617"/>
  <circle cx="140" cy="230" r="6" fill="#020617"/>
  <circle cx="140" cy="270" r="6" fill="#020617"/>

  <!-- Film holes (right) -->
  <circle cx="340" cy="190" r="6" fill="#020617"/>
  <circle cx="340" cy="230" r="6" fill="#020617"/>
  <circle cx="340" cy="270" r="6" fill="#020617"/>

  <!-- Play icon -->
  <polygon points="220,200 300,240 220,280" fill="#020617"/>

</svg>